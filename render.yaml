services:
  - type: web
    name: music-api
    runtime: python
    repo: https://github.com/cheahunseng22/music-backend-fastapi.git  # ← CHANGE THIS
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: music-db
          property: connectionString

databases:
  - name: music-db
    plan: free